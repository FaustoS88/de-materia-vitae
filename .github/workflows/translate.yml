name: Auto-translate protocols

on:
  push:
    branches: [main]
    paths:
      - 'protocols/*.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild Quick Reference + References
        run: |
          cat > /tmp/rebuild-refs.mjs << 'SCRIPT'
          import { readFileSync, writeFileSync, readdirSync } from 'node:fs'
          import { join } from 'node:path'

          const PROTOCOLS = join(process.env.GITHUB_WORKSPACE, 'protocols')

          function parseProtocol(content) {
            const sections = [], parts = content.split(/(?=^## )/m)
            let intro = '', quickRef = null, refs = null
            for (const part of parts) {
              const m = part.match(/^## (.+)/)
              if (!m) { intro = part; continue }
              const t = m[1].trim()
              if (/^Quick Reference/i.test(t)) quickRef = part
              else if (/^References$/i.test(t) || /^Riferimenti$/i.test(t) || /^Referencias$/i.test(t)) refs = part
              else sections.push({ title: t, content: part })
            }
            return { intro, sections, quickRef, refs }
          }

          function extractData(section) {
            const title = section.title.replace(/^[IVXLC]+\.\s*/, '').replace(/^\d+\.\s*/, '').trim()
            const doseM = section.content.match(/\*\*Dose:\*\*\s*(.+)/i)
            const dose = doseM ? doseM[1].trim() : '—'
            const evM = section.content.match(/Evidence Summary:\*\*\s*(★+☆*)/i)
            const evidence = evM ? evM[1] : '—'
            const sources = []
            const srcM = section.content.match(/### Ancient Source[\s\S]*?\|[\s\S]*?\|[\s\S]*?\|([\s\S]*?)(?=###|\n---|\n## )/i)
            if (srcM) {
              for (const row of srcM[1].split('\n').filter(r => r.trim().startsWith('|') && !r.includes('---'))) {
                const c = row.split('|').filter(x => x.trim())
                if (c.length >= 1) {
                  const s = c[0].trim().replace(/\*[^*]*\*/g, '').split(',')[0].trim()
                  if (s && !s.includes('Source') && !s.includes('---')) sources.push(s)
                }
              }
            }
            const pmids = []
            const re = /\|\s*([^|]+?)\s*\|\s*([^|]+?)\s*\|\s*PMID:\s*(\d+)\s*\|/g
            let pm
            while ((pm = re.exec(section.content)) !== null) {
              pmids.push({ study: pm[1].trim(), pmid: pm[3] })
            }
            return { title, dose, evidence, sources, pmids }
          }

          const files = readdirSync(PROTOCOLS).filter(f => f.endsWith('.md') && f !== '_template.md').sort()
          for (const file of files) {
            const path = join(PROTOCOLS, file)
            const content = readFileSync(path, 'utf-8')
            const { intro, sections } = parseProtocol(content)
            if (!sections.length) continue
            const data = sections.map(extractData)
            const nameM = intro.match(/^# \d+\s*—\s*(.+)/m)
            const name = nameM ? nameM[1].trim() : 'Protocol'
            const qr = ['## Quick Reference — ' + name, '', '| # | Practice | Dose | Evidence | Ancient Source |', '|---|----------|------|----------|---------------|']
            data.forEach((d, i) => qr.push(`| ${i+1} | ${d.title} | ${d.dose} | ${d.evidence} | ${d.sources.slice(0,3).join(', ') || '—'} |`))
            const seen = new Set()
            const refLines = ['## References', '']
            let n = 1
            for (const d of data) for (const p of d.pmids) {
              if (seen.has(p.pmid)) continue
              seen.add(p.pmid)
              refLines.push(`${n++}. ${p.study}. PMID: ${p.pmid}.`)
            }
            const parts = [intro.trim(), ...sections.map(s => s.content.trim()), qr.join('\n')]
            if (refLines.length > 2) parts.push(refLines.join('\n'))
            writeFileSync(path, parts.join('\n\n---\n\n') + '\n', 'utf-8')
            console.log(`  ${file}: ${data.length} sections, ${seen.size} refs`)
          }
          SCRIPT
          node /tmp/rebuild-refs.mjs

      - name: Commit rebuilt refs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add protocols/
          if git diff --cached --quiet; then
            echo "No reference changes"
          else
            git commit -m "chore: auto-rebuild Quick Reference + References [skip ci]"
          fi

      - name: Translate protocols to IT + ES
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cat > /tmp/translate.mjs << 'SCRIPT'
          import { readFileSync, writeFileSync, mkdirSync, readdirSync } from 'node:fs'
          import { join } from 'node:path'

          const BACKEND = process.env.GITHUB_WORKSPACE
          const PROTOCOLS = join(BACKEND, 'protocols')
          const LANGS = { it: 'Italian', es: 'Spanish' }
          const MODEL = 'llama-3.1-8b-instant'
          const API = 'https://api.groq.com/openai/v1/chat/completions'

          async function translate(markdown, lang, langName) {
            const res = await fetch(API, {
              method: 'POST',
              headers: { Authorization: `Bearer ${process.env.GROQ_API_KEY}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: MODEL,
                messages: [
                  { role: 'system', content: `You are a precise medical/scientific translator. Translate the following markdown from English to ${langName}. Preserve ALL markdown formatting, URLs, DOIs, PMIDs, author names, journal names, years, page numbers, citation references, star ratings. Translate naturally using proper ${langName} medical terminology. Return ONLY the translated markdown.` },
                  { role: 'user', content: markdown },
                ],
                temperature: 0.2,
                max_tokens: 32000,
              }),
            })
            if (!res.ok) throw new Error(`Groq ${res.status}: ${await res.text()}`)
            const data = await res.json()
            return data.choices[0]?.message?.content || ''
          }

          const files = readdirSync(PROTOCOLS).filter(f => f.endsWith('.md') && f !== '_template.md').sort()
          console.log(`Translating ${files.length} files...`)

          for (const [lang, name] of Object.entries(LANGS)) {
            const outDir = join(BACKEND, 'translations', lang)
            mkdirSync(outDir, { recursive: true })
            for (const file of files) {
              const english = readFileSync(join(PROTOCOLS, file), 'utf-8')
              process.stdout.write(`  [${lang.toUpperCase()}] ${file}... `)
              const t0 = Date.now()
              const translated = await translate(english, lang, name)
              writeFileSync(join(outDir, file), translated, 'utf-8')
              console.log(`done (${((Date.now()-t0)/1000).toFixed(1)}s)`)
            }
          }
          console.log('Done.')
          SCRIPT
          node /tmp/translate.mjs

      - name: Commit and push all changes
        run: |
          git add translations/ protocols/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-rebuild refs + update IT/ES translations [skip ci]"
            git push
          fi
